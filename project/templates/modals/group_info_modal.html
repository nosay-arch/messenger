<div id="group-info-modal-template" style="display: none;">
    <div class="modal" id="group-info-modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="group-name-display"></h3>
            <p id="group-description-display"></p>
            <p id="group-member-count"></p>
            <h4>Участники:</h4>
            <div id="group-members-list" class="members-list"></div>
            <div id="group-add-member-section" style="display: none;">
                <input type="text" id="group-info-search" placeholder="Добавить участника...">
                <div id="group-info-results" class="search-results"></div>
            </div>
            <button id="leave-group-btn">Покинуть группу</button>
        </div>
    </div>
</div>

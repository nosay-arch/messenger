<div id="create-group-modal-template" style="display: none;">
    <div class="modal" id="create-group-modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3><i class="fas fa-users" style="margin-right: 8px; color: var(--accent-light);"></i>Новая группа</h3>

            <div class="group-creation">
                <!-- Step indicator -->
                <div class="step-indicator">
                    <div class="step active" data-step="1">1 · Участники</div>
                    <div class="step" data-step="2">2 · Название</div>
                </div>

                <!-- Step 1: Select members -->
                <div class="step-content" id="group-step-1">
                    <div class="user-search-area">
                        <input
                            type="text"
                            id="group-user-search"
                            placeholder="Поиск участников..."
                            autocomplete="off"
                        >
                        <div id="group-search-results" class="search-results"></div>
                    </div>

                    <div class="selected-users">
                        <div class="section-label">Выбранные участники</div>
                        <div id="selected-users-list" class="selected-users-list"></div>
                    </div>

                    <div class="step-actions">
                        <button id="group-next-step" disabled>
                            Далее <i class="fas fa-arrow-right" style="margin-left: 6px;"></i>
                        </button>
                    </div>
                </div>

                <!-- Step 2: Group name & description -->
                <div class="step-content hidden" id="group-step-2">
                    <input
                        type="text"
                        id="group-name"
                        placeholder="Название группы"
                        maxlength="100"
                        autocomplete="off"
                    >
                    <textarea
                        id="group-description"
                        placeholder="Описание (необязательно)"
                        rows="3"
                        maxlength="300"
                    ></textarea>

                    <div class="step-actions">
                        <button id="group-back-step">
                            <i class="fas fa-arrow-left" style="margin-right: 6px;"></i>Назад
                        </button>
                        <button id="create-group-btn" disabled>
                            <i class="fas fa-check" style="margin-right: 6px;"></i>Создать группу
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

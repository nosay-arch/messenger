<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Вход - Мессенджер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
</head>
<body>
    <div class="auth-overlay" style="position: fixed; background: var(--bg);">
        <div class="auth-card">
            <input type="hidden" id="csrf-token" value="{{ csrf_token() }}">

            <div class="auth-header">
                <h2 id="auth-title" class="auth-card-title">Вход</h2>
                <p id="auth-subtitle" class="auth-card-subtitle">Введите свои данные</p>
            </div>

            <div id="auth-error" class="error-message hidden"></div>

            <div class="auth-fields">
                <div class="input-group" id="login-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="auth-login" placeholder="Имя пользователя" autocomplete="username">
                </div>

                <div class="input-group hidden" id="username-group">
                    <i class="fas fa-user-plus"></i>
                    <input type="text" id="auth-username" placeholder="Имя (только для регистрации)" autocomplete="off">
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="auth-password" placeholder="Пароль" autocomplete="current-password">
                </div>

                <div class="input-group hidden" id="password-confirm-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="auth-password-confirm" placeholder="Подтвердите пароль" autocomplete="new-password">
                </div>
            </div>

            <button id="auth-submit" class="btn-primary btn-full">Войти</button>
            <button id="auth-toggle" class="btn-link">Нет аккаунта? Зарегистрироваться</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        class SimpleAuthApp {
            constructor() {
                this.currentUserId = null;
                this.currentUsername = '';
                this.auth = new Auth(this);
            }
        }
        new SimpleAuthApp();
    </script>
</body>
</html>

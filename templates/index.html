<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Мессенджер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
</head>
<body>
    <div class="app-container">
        <div id="loading-screen" class="loading-screen">
            <div class="loader"></div>
            <p>Загрузка...</p>
        </div>

        <div id="auth-overlay" class="auth-overlay hidden">
            <div class="auth-card">
                <input type="hidden" id="csrf-token" value="{{ csrf_token() }}">

                <div id="phone-step">
                    <h2 class="auth-card-title">Добро пожаловать</h2>
                    <p class="auth-card-subtitle">Войдите с помощью номера телефона</p>
                    <div id="phone-error" class="error-message hidden"></div>
                    <div class="input-group">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="phone-input" placeholder="+7 (900) 123-45-67" autocomplete="off">
                    </div>
                    <button id="phone-send-btn" class="btn-primary btn-full">Отправить код</button>
                </div>

                <div id="code-step" class="hidden">
                    <h2 class="auth-card-title">Проверка кода</h2>
                    <p class="auth-card-subtitle">Код отправлен на <span class="masked-phone"></span></p>
                    <div id="code-error" class="error-message hidden"></div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="text" id="code-input" placeholder="000000" maxlength="6" autocomplete="off" inputmode="numeric">
                    </div>
                    <button id="code-verify-btn" class="btn-primary btn-full">Проверить</button>
                    <button id="code-back-btn" class="btn-secondary btn-full">← Назад</button>
                </div>

                <div id="profile-step" class="hidden">
                    <h2 class="auth-card-title">Создание профиля</h2>
                    <div id="profile-error" class="error-message hidden"></div>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="profile-username-input" placeholder="Ваше имя в приложении" autocomplete="off" maxlength="80">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-quote-left"></i>
                        <textarea id="profile-bio-input" placeholder="О себе (опционально)" maxlength="500"></textarea>
                    </div>
                    <button id="profile-register-btn" class="btn-primary btn-full">Начать</button>
                    <button id="profile-back-btn" class="btn-secondary btn-full">← Назад</button>
                </div>
            </div>
        </div>

        <div id="main-interface" class="main-panel hidden">

            <div class="chats-sidebar" id="chats-sidebar">
                <div class="chats-header">
                    <div class="chats-header-left">
                        <button id="user-menu-button" class="user-menu-button">⋯</button>
                        <div id="user-popup" class="user-popup hidden">
                            <div class="popup-header">
                                <div class="popup-username" id="popup-username"></div>
                            </div>
                            <div class="popup-divider"></div>
                            <button id="popup-profile" class="popup-item">
                                <i class="fas fa-user-circle"></i>
                                <span>Профиль</span>
                            </button>
                            <button id="popup-create-group" class="popup-item">
                                <i class="fas fa-users"></i>
                                <span>Создать группу</span>
                            </button>
                            <button id="popup-logout" class="popup-item logout">
                                <i class="fas fa-sign-out-alt"></i>
                                <span>Выйти</span>
                            </button>
                            <div class="popup-footer">
                                <span class="popup-version">версия 1.0.0</span>
                            </div>
                        </div>
                    </div>

                    <div class="chats-header-center">
                        <input type="text" id="sidebar-user-search" placeholder="Поиск" autocomplete="off">
                        <div id="sidebar-search-results" class="search-results"></div>
                    </div>
                </div>

                <div id="chats-list" class="chats-list"></div>
            </div>

            <div id="resizer" class="resizer"></div>

            <div class="chat-area">
                <div id="chat-header" class="chat-header hidden">
                    <button id="back-to-chats" class="back-button">←</button>
                    <span id="chat-partner-name" class="chat-partner-name"></span>
                    <span id="online-status" class="online-status"></span>
                    <div id="typing-indicator" class="typing-indicator hidden">
                        <span></span><span></span><span></span>
                    </div>
                </div>

                <div id="messages-container" class="messages-container hidden"></div>

                <div id="chat-placeholder" class="chat-placeholder">Выберите чат</div>

                <div id="input-area" class="input-area hidden">
                    <input type="text" id="message-input" placeholder="Введите сообщение" autocomplete="off">
                    <button id="send-btn">➤ Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/profile.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
    <script src="{{ url_for('static', filename='js/socket.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
